name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build, test and verify (incl. license-header check)
        run: mvn -B clean install

      - name: Upload built OMOD
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cdshooks-omod
          path: omod/target/*.omod
          if-no-files-found: warn
