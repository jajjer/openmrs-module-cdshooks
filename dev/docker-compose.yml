# Standalone, isolated stack for local testing of the cdshooks module.
# Pulls the official OpenMRS RefApp 3 images (gateway, frontend, backend) plus MariaDB.
#
# Usage from the repository root:
#   docker compose -p cdshooks-dev -f dev/docker-compose.yml up -d
#
# Frontend will be at http://localhost:8081/openmrs/spa
# REST/FHIR at http://localhost:8081/openmrs/ws/...
# Module admin UI at http://localhost:8081/openmrs/admin/modules/module.list
# Default credentials: admin / Admin123

services:
  gateway:
    image: openmrs/openmrs-reference-application-3-gateway:qa
    restart: "unless-stopped"
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:80"

  frontend:
    image: openmrs/openmrs-reference-application-3-frontend:qa
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config-core_demo.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 5s
    depends_on:
      - backend

  backend:
    image: openmrs/openmrs-reference-application-3-backend:qa
    restart: "unless-stopped"
    depends_on:
      - db
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: openmrs
      OMRS_CONFIG_CONNECTION_PASSWORD: openmrs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs"]
      timeout: 5s
    volumes:
      - openmrs-data:/openmrs/data

  db:
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    healthcheck:
      test: "mysql --user=openmrs --password=openmrs --execute \"SHOW DATABASES;\""
      interval: 3s
      timeout: 1s
      retries: 5
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: openmrs
      MYSQL_ROOT_PASSWORD: openmrs
    volumes:
      - db-data:/var/lib/mysql

volumes:
  openmrs-data: ~
  db-data: ~
